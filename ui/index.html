<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go RDP Server</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #0f172a;
        overflow: hidden;
      }
      #display {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: default;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        color: #94a3b8;
        font-family: system-ui, sans-serif;
        font-size: 1rem;
        pointer-events: none;
      }
      #overlay.interactive { pointer-events: auto; }
      #status { font-size: 0.85rem; }
      /* Login form */
      #loginBox {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 28px 32px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-width: 280px;
      }
      #loginBox h2 {
        margin: 0 0 4px;
        font-size: 1.1rem;
        color: #e2e8f0;
        text-align: center;
      }
      #loginBox label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 0.85rem;
        color: #94a3b8;
      }
      #loginBox input[type="text"],
      #loginBox input[type="password"] {
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid #475569;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 0.95rem;
        outline: none;
      }
      #loginBox input:focus { border-color: #1d4ed8; }
      #loginBox .hint { font-size: 0.75rem; color: #64748b; }
      #loginBox button {
        padding: 9px 0;
        border: 0;
        border-radius: 6px;
        background: #1d4ed8;
        color: #fff;
        font-size: 0.95rem;
        cursor: pointer;
      }
      #loginBox button:hover { background: #1e40af; }
      #loginError { color: #f87171; font-size: 0.82rem; text-align: center; }
      #toggleKeyboard {
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 10;
        border: 0;
        border-radius: 8px;
        background: #1d4ed8;
        color: #fff;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <canvas id="display"></canvas>
    <div id="overlay">
      <!-- login form (shown in per-user-login mode) -->
      <div id="loginBox" style="display:none">
        <h2>Remote Desktop Login</h2>
        <label>
          Username
          <input type="text" id="loginUser" autocomplete="username" required />
        </label>
        <label>
          Password
          <input type="password" id="loginPass" autocomplete="current-password" />
          <span class="hint">Leave blank for a passwordless account</span>
        </label>
        <div id="loginError"></div>
        <button id="loginBtn">Connect</button>
      </div>
      <!-- connecting spinner (shown while WS is opening) -->
      <span id="connectingMsg" style="display:none">Connecting…</span>
      <span id="status"></span>
    </div>
    <button id="toggleKeyboard">Keyboard</button>

    <script>
      // ── Canvas setup ──────────────────────────────────────────────────────────
      const canvas = document.getElementById('display');
      const ctx = canvas.getContext('2d');
      const overlay = document.getElementById('overlay');
      const status = document.getElementById('status');
      const loginBox = document.getElementById('loginBox');
      const connectingMsg = document.getElementById('connectingMsg');
      const loginError = document.getElementById('loginError');

      // Fixed RDP session resolution - must match the server-side default.
      const RDP_WIDTH = 1280;
      const RDP_HEIGHT = 720;
      // Set canvas backing store to the RDP session resolution so tile
      // coordinates are always consistent. The CSS in the stylesheet scales
      // the element to fill the viewport.
      canvas.width = RDP_WIDTH;
      canvas.height = RDP_HEIGHT;

      // ── PS/2 scancode table (KeyboardEvent.code → PS/2 make code) ────────────
      // Source: https://download.microsoft.com/download/1/6/1/161ba512-40e2-4cc9-843a-923143f3456c/translate.pdf
      const SCANCODES = {
        Escape: 0x01, Digit1: 0x02, Digit2: 0x03, Digit3: 0x04, Digit4: 0x05,
        Digit5: 0x06, Digit6: 0x07, Digit7: 0x08, Digit8: 0x09, Digit9: 0x0A,
        Digit0: 0x0B, Minus: 0x0C, Equal: 0x0D, Backspace: 0x0E, Tab: 0x0F,
        KeyQ: 0x10, KeyW: 0x11, KeyE: 0x12, KeyR: 0x13, KeyT: 0x14,
        KeyY: 0x15, KeyU: 0x16, KeyI: 0x17, KeyO: 0x18, KeyP: 0x19,
        BracketLeft: 0x1A, BracketRight: 0x1B, Enter: 0x1C,
        ControlLeft: 0x1D, ControlRight: 0xE01D,
        KeyA: 0x1E, KeyS: 0x1F, KeyD: 0x20, KeyF: 0x21, KeyG: 0x22,
        KeyH: 0x23, KeyJ: 0x24, KeyK: 0x25, KeyL: 0x26,
        Semicolon: 0x27, Quote: 0x28, Backquote: 0x29,
        ShiftLeft: 0x2A, Backslash: 0x2B,
        KeyZ: 0x2C, KeyX: 0x2D, KeyC: 0x2E, KeyV: 0x2F, KeyB: 0x30,
        KeyN: 0x31, KeyM: 0x32, Comma: 0x33, Period: 0x34, Slash: 0x35,
        ShiftRight: 0x36, NumpadMultiply: 0x37,
        AltLeft: 0x38, AltRight: 0xE038,
        Space: 0x39, CapsLock: 0x3A,
        F1: 0x3B, F2: 0x3C, F3: 0x3D, F4: 0x3E, F5: 0x3F, F6: 0x40,
        F7: 0x41, F8: 0x42, F9: 0x43, F10: 0x44,
        NumLock: 0x45, ScrollLock: 0x46,
        Numpad7: 0x47, Numpad8: 0x48, Numpad9: 0x49, NumpadSubtract: 0x4A,
        Numpad4: 0x4B, Numpad5: 0x4C, Numpad6: 0x4D, NumpadAdd: 0x4E,
        Numpad1: 0x4F, Numpad2: 0x50, Numpad3: 0x51, Numpad0: 0x52,
        NumpadDecimal: 0x53,
        F11: 0x57, F12: 0x58,
        NumpadEnter: 0xE01C,
        NumpadDivide: 0xE035,
        PrintScreen: 0xE037,
        Home: 0xE047, ArrowUp: 0xE048, PageUp: 0xE049,
        ArrowLeft: 0xE04B, ArrowRight: 0xE04D,
        End: 0xE04F, ArrowDown: 0xE050, PageDown: 0xE051,
        Insert: 0xE052, Delete: 0xE053,
        MetaLeft: 0xE05B, MetaRight: 0xE05C,
        ContextMenu: 0xE05D,
        Pause: 0xE11D,
      };

      // ── WebSocket helpers ─────────────────────────────────────────────────────
      let ws = null;

      function showOverlay(interactive) {
        overlay.style.display = 'flex';
        if (interactive) overlay.classList.add('interactive');
        else overlay.classList.remove('interactive');
      }
      function hideOverlay() {
        overlay.style.display = 'none';
        overlay.classList.remove('interactive');
      }

      function openWebSocket(authPayload) {
        loginBox.style.display = 'none';
        connectingMsg.style.display = '';
        status.textContent = '';
        showOverlay(false);

        const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${protocol}://${location.host}/ws/rdp`);
        ws.binaryType = 'blob';

        ws.addEventListener('open', () => {
          if (authPayload) {
            ws.send(JSON.stringify(authPayload));
          }
          hideOverlay();
          canvas.focus();
        });

        ws.addEventListener('close', (e) => {
          const reason = e.reason ? ` — ${e.reason}` : '';
          const msg = `Disconnected (${e.code})${reason}`;
          if (authPayload) {
            // Per-user mode: go back to login form so the user can retry.
            connectingMsg.style.display = 'none';
            loginError.textContent = msg;
            loginBox.style.display = '';
            status.textContent = '';
            showOverlay(true);
          } else {
            showOverlay(false);
            status.textContent = msg;
          }
        });

        ws.addEventListener('error', () => {
          if (authPayload) {
            connectingMsg.style.display = 'none';
            loginError.textContent = 'Connection error';
            loginBox.style.display = '';
            showOverlay(true);
          } else {
            showOverlay(false);
            status.textContent = 'Connection error';
          }
        });

        ws.addEventListener('message', handleMessage);
      }

      function handleMessage(e) {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.type !== 'tile') return;

        const img = new Image();
        let url = '';
        img.onload = () => {
          ctx.drawImage(img, msg.x, msg.y);
          if (url) URL.revokeObjectURL(url);
        };
        img.onerror = () => { if (url) URL.revokeObjectURL(url); };

        // Decode base64 JPEG and create an object URL for fast drawImage.
        let binary;
        try { binary = atob(msg.data); } catch { return; }
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        url = URL.createObjectURL(new Blob([bytes], { type: 'image/jpeg' }));
        img.src = url;
      }

      function send(msg) {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
      }

      // ── Startup: fetch server config ──────────────────────────────────────────
      showOverlay(false);
      connectingMsg.style.display = '';

      fetch('/api/config')
        .then(r => r.json())
        .catch(() => ({ perUserLogin: false }))
        .then(cfg => {
          if (cfg.perUserLogin) {
            // Show login form; WS will be opened on form submit.
            connectingMsg.style.display = 'none';
            loginError.textContent = '';
            loginBox.style.display = '';
            showOverlay(true);

            document.getElementById('loginBtn').addEventListener('click', submitLogin);
            document.getElementById('loginPass').addEventListener('keydown', (e) => {
              if (e.key === 'Enter') submitLogin();
            });
            document.getElementById('loginUser').addEventListener('keydown', (e) => {
              if (e.key === 'Enter') submitLogin();
            });
          } else {
            // Non-per-user mode: connect immediately (existing behaviour).
            openWebSocket(null);
          }
        });

      function submitLogin() {
        const username = document.getElementById('loginUser').value.trim();
        if (!username) {
          loginError.textContent = 'Username is required.';
          return;
        }
        const password = document.getElementById('loginPass').value;
        loginError.textContent = '';
        openWebSocket({ type: 'auth', username, password });
      }

      // ── Keyboard ──────────────────────────────────────────────────────────────
      let keyboardEnabled = false;
      const toggleBtn = document.getElementById('toggleKeyboard');
      toggleBtn.addEventListener('click', () => {
        keyboardEnabled = !keyboardEnabled;
        toggleBtn.textContent = keyboardEnabled ? 'Keyboard ON' : 'Keyboard';
      });

      document.addEventListener('keydown', (e) => {
        if (!keyboardEnabled) return;
        const sc = SCANCODES[e.code];
        if (!sc) return;
        e.preventDefault();
        send({ type: 'keydown', scancode: sc });
      });
      document.addEventListener('keyup', (e) => {
        if (!keyboardEnabled) return;
        const sc = SCANCODES[e.code];
        if (!sc) return;
        e.preventDefault();
        send({ type: 'keyup', scancode: sc });
      });

      // ── Mouse ─────────────────────────────────────────────────────────────────
      // Scale CSS-pixel offsets to the canvas backing-store coordinate space
      // (1280×720) so that pointer positions match the RDP session resolution.
      function rdpCoords(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: Math.round(e.offsetX * canvas.width / rect.width),
          y: Math.round(e.offsetY * canvas.height / rect.height),
        };
      }
      canvas.addEventListener('mousemove', (e) => {
        const { x, y } = rdpCoords(e);
        send({ type: 'mousemove', x, y });
      });
      canvas.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const { x, y } = rdpCoords(e);
        send({ type: 'mousedown', button: e.button, x, y });
      });
      canvas.addEventListener('mouseup', (e) => {
        const { x, y } = rdpCoords(e);
        send({ type: 'mouseup', button: e.button, x, y });
      });
      canvas.addEventListener('contextmenu', (e) => e.preventDefault());
      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const { x, y } = rdpCoords(e);
        // Browser deltaY: positive = scroll down. RDP convention: positive = scroll up.
        const delta = e.deltaY > 0 ? -1 : 1;
        send({ type: 'mousewheel', delta, x, y });
      }, { passive: false });
    </script>
  </body>
</html>
