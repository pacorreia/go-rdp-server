<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go RDP Server</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #0f172a;
        overflow: hidden;
      }
      #display {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: default;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        color: #94a3b8;
        font-family: system-ui, sans-serif;
        font-size: 1rem;
        pointer-events: none;
      }
      #status { font-size: 0.85rem; }
      #toggleKeyboard {
        position: fixed;
        bottom: 16px;
        right: 16px;
        z-index: 10;
        border: 0;
        border-radius: 8px;
        background: #1d4ed8;
        color: #fff;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <canvas id="display"></canvas>
    <div id="overlay">
      <span>Connecting…</span>
      <span id="status"></span>
    </div>
    <button id="toggleKeyboard">Keyboard</button>

    <script>
      // ── Canvas setup ──────────────────────────────────────────────────────────
      const canvas = document.getElementById('display');
      const ctx = canvas.getContext('2d');
      const overlay = document.getElementById('overlay');
      const status = document.getElementById('status');

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // ── PS/2 scancode table (KeyboardEvent.code → PS/2 make code) ────────────
      // Source: https://download.microsoft.com/download/1/6/1/161ba512-40e2-4cc9-843a-923143f3456c/translate.pdf
      const SCANCODES = {
        Escape: 0x01, Digit1: 0x02, Digit2: 0x03, Digit3: 0x04, Digit4: 0x05,
        Digit5: 0x06, Digit6: 0x07, Digit7: 0x08, Digit8: 0x09, Digit9: 0x0A,
        Digit0: 0x0B, Minus: 0x0C, Equal: 0x0D, Backspace: 0x0E, Tab: 0x0F,
        KeyQ: 0x10, KeyW: 0x11, KeyE: 0x12, KeyR: 0x13, KeyT: 0x14,
        KeyY: 0x15, KeyU: 0x16, KeyI: 0x17, KeyO: 0x18, KeyP: 0x19,
        BracketLeft: 0x1A, BracketRight: 0x1B, Enter: 0x1C,
        ControlLeft: 0x1D, ControlRight: 0xE01D,
        KeyA: 0x1E, KeyS: 0x1F, KeyD: 0x20, KeyF: 0x21, KeyG: 0x22,
        KeyH: 0x23, KeyJ: 0x24, KeyK: 0x25, KeyL: 0x26,
        Semicolon: 0x27, Quote: 0x28, Backquote: 0x29,
        ShiftLeft: 0x2A, Backslash: 0x2B,
        KeyZ: 0x2C, KeyX: 0x2D, KeyC: 0x2E, KeyV: 0x2F, KeyB: 0x30,
        KeyN: 0x31, KeyM: 0x32, Comma: 0x33, Period: 0x34, Slash: 0x35,
        ShiftRight: 0x36, NumpadMultiply: 0x37,
        AltLeft: 0x38, AltRight: 0xE038,
        Space: 0x39, CapsLock: 0x3A,
        F1: 0x3B, F2: 0x3C, F3: 0x3D, F4: 0x3E, F5: 0x3F, F6: 0x40,
        F7: 0x41, F8: 0x42, F9: 0x43, F10: 0x44,
        NumLock: 0x45, ScrollLock: 0x46,
        Numpad7: 0x47, Numpad8: 0x48, Numpad9: 0x49, NumpadSubtract: 0x4A,
        Numpad4: 0x4B, Numpad5: 0x4C, Numpad6: 0x4D, NumpadAdd: 0x4E,
        Numpad1: 0x4F, Numpad2: 0x50, Numpad3: 0x51, Numpad0: 0x52,
        NumpadDecimal: 0x53,
        F11: 0x57, F12: 0x58,
        NumpadEnter: 0xE01C,
        NumpadDivide: 0xE035,
        PrintScreen: 0xE037,
        Home: 0xE047, ArrowUp: 0xE048, PageUp: 0xE049,
        ArrowLeft: 0xE04B, ArrowRight: 0xE04D,
        End: 0xE04F, ArrowDown: 0xE050, PageDown: 0xE051,
        Insert: 0xE052, Delete: 0xE053,
        MetaLeft: 0xE05B, MetaRight: 0xE05C,
        ContextMenu: 0xE05D,
        Pause: 0xE11D,
      };

      // ── WebSocket ─────────────────────────────────────────────────────────────
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${protocol}://${location.host}/ws/rdp`);
      ws.binaryType = 'blob';

      ws.addEventListener('open', () => {
        overlay.style.display = 'none';
        canvas.focus();
      });
      ws.addEventListener('close', (e) => {
        overlay.style.display = 'flex';
        status.textContent = `Disconnected (${e.code})`;
      });
      ws.addEventListener('error', () => {
        overlay.style.display = 'flex';
        status.textContent = 'Connection error';
      });

      ws.addEventListener('message', (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        if (msg.type !== 'tile') return;

        const img = new Image();
        img.onload = () => {
          ctx.drawImage(img, msg.x, msg.y);
          URL.revokeObjectURL(img.src);
        };
        // Decode base64 JPEG and create an object URL for fast drawImage.
        const binary = atob(msg.data);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        img.src = URL.createObjectURL(new Blob([bytes], { type: 'image/jpeg' }));
      });

      function send(msg) {
        if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
      }

      // ── Keyboard ──────────────────────────────────────────────────────────────
      let keyboardEnabled = false;
      const toggleBtn = document.getElementById('toggleKeyboard');
      toggleBtn.addEventListener('click', () => {
        keyboardEnabled = !keyboardEnabled;
        toggleBtn.textContent = keyboardEnabled ? 'Keyboard ON' : 'Keyboard';
      });

      document.addEventListener('keydown', (e) => {
        if (!keyboardEnabled) return;
        const sc = SCANCODES[e.code];
        if (!sc) return;
        e.preventDefault();
        send({ type: 'keydown', scancode: sc });
      });
      document.addEventListener('keyup', (e) => {
        if (!keyboardEnabled) return;
        const sc = SCANCODES[e.code];
        if (!sc) return;
        e.preventDefault();
        send({ type: 'keyup', scancode: sc });
      });

      // ── Mouse ─────────────────────────────────────────────────────────────────
      canvas.addEventListener('mousemove', (e) => {
        send({ type: 'mousemove', x: e.offsetX, y: e.offsetY });
      });
      canvas.addEventListener('mousedown', (e) => {
        e.preventDefault();
        send({ type: 'mousedown', button: e.button, x: e.offsetX, y: e.offsetY });
      });
      canvas.addEventListener('mouseup', (e) => {
        send({ type: 'mouseup', button: e.button, x: e.offsetX, y: e.offsetY });
      });
      canvas.addEventListener('contextmenu', (e) => e.preventDefault());
      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        // Browser deltaY: positive = scroll down. RDP convention: positive = scroll up.
        const delta = e.deltaY > 0 ? -1 : 1;
        send({ type: 'mousewheel', delta, x: e.offsetX, y: e.offsetY });
      }, { passive: false });
    </script>
  </body>
</html>
