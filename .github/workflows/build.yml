name: pr-checks

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Test
        run: go test ./...

      - name: Build (windows/amd64)
        run: GOOS=windows GOARCH=amd64 go build ./...
