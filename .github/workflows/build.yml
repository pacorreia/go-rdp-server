name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build (windows/amd64)
        run: GOOS=windows GOARCH=amd64 go build ./...
