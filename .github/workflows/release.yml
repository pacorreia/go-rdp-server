name: release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.determine.outputs.release_created }}
      tag_name: ${{ steps.determine.outputs.tag_name }}
    steps:
      - name: Run Release Please
        if: github.event_name == 'push'
        uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6

      - name: Create tag and GitHub release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          git tag -- "$TAG_NAME"
          git push origin "refs/tags/$TAG_NAME"
          gh release create "$TAG_NAME" --generate-notes

      - name: Determine release outputs
        id: determine
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "release_created=true" >> "$GITHUB_OUTPUT"
            printf 'tag_name=%s\n' "$TAG_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "release_created=${{ steps.release.outputs.release_created }}" >> "$GITHUB_OUTPUT"
            echo "tag_name=${{ steps.release.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.release_created == 'true' }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag_name }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          binary_name="rdpserver"
          if [ "${GOOS}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi
          output_dir="dist/rdpserver-${GOOS}-${GOARCH}"
          mkdir -p "${output_dir}"
          go build -o "${output_dir}/${binary_name}" ./cmd/rdpserver

      - name: Package artifact
        run: |
          output_dir="dist/rdpserver-${{ matrix.goos }}-${{ matrix.goarch }}"
          archive_name="rdpserver-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r "${archive_name}.zip" "$(basename "${output_dir}")")
          else
            tar -czf "dist/${archive_name}.tar.gz" -C dist "$(basename "${output_dir}")"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/rdpserver-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}

  publish:
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: ${{ needs.prepare.outputs.release_created == 'true' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          files: dist/*
